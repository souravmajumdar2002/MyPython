<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        :root {
            --bg: #111827;
            --panel: #182233;
            --line: rgba(255, 255, 255, 0.08);
            --text: #ecf4ff;
            --muted: #aac0db;
            --accent: #4fd1c5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(79, 209, 197, 0.18), transparent 25%),
                linear-gradient(160deg, #09111d, var(--bg));
            color: var(--text);
            padding: 36px 16px;
            display: grid;
            place-items: center;
        }

        .contact-layout {
            width: min(980px, 100%);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            background: rgba(9, 17, 29, 0.6);
            border: 1px solid var(--line);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
        }

        .contact-copy,
        .contact-box {
            padding: 38px;
        }

        .contact-copy {
            background: linear-gradient(180deg, rgba(79, 209, 197, 0.08), transparent);
        }

        .label {
            margin: 0 0 12px;
            color: var(--accent);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-size: 0.76rem;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2rem, 5vw, 3.6rem);
        }

        p {
            line-height: 1.75;
            color: var(--muted);
        }

        .contact-box {
            background: var(--panel);
            border-left: 1px solid var(--line);
        }

        .info {
            display: grid;
            gap: 16px;
            margin-top: 22px;
        }

        .info-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
        }

        .info-item strong {
            display: block;
            margin-bottom: 6px;
            color: #ffffff;
        }

        @media (max-width: 760px) {
            .contact-layout {
                grid-template-columns: 1fr;
            }

            .contact-box {
                border-left: 0;
                border-top: 1px solid var(--line);
            }

            .contact-copy,
            .contact-box {
                padding: 26px 22px;
            }
        }
    </style>
</head>
<body>
    <main class="contact-layout">
        <section class="contact-copy">
            <p class="label">Contact</p>
            <h1>Let customers reach you quickly.</h1>
            <p>This page uses a darker support-style layout so it is visually separate from both Home and About. Later you can replace this with a real contact form.</p>
        </section>
        <section class="contact-box">
            <div class="info">
                <div class="info-item">
                    <strong>Email</strong>
                    support@example.com
                </div>
                <div class="info-item">
                    <strong>Phone</strong>
                    +91 90000 00000
                </div>
                <div class="info-item">
                    <strong>Hours</strong>
                    Monday to Saturday, 9:00 AM to 6:00 PM
                </div>
            </div>
        </section>
    </main>
</body>
</html>
